name: secret-scan

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/check-no-secrets.sh

          # Prefer a range scan when we have a base to compare against:
          #   - pull_request: base.sha..head.sha
          #   - push:         event.before..event.after (when before != 0…0)
          # Otherwise fall back to a full-tree scan (handles first push to
          # a new branch, where `before` is all zeros).
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          head="${{ github.event.pull_request.head.sha || github.sha }}"
          zeros="0000000000000000000000000000000000000000"

          if [[ -n "$base" && "$base" != "$zeros" ]] && \
             git rev-parse --verify "$base" >/dev/null 2>&1 && \
             git rev-parse --verify "$head" >/dev/null 2>&1; then
            echo "scanning range $base..$head"
            bash scripts/check-no-secrets.sh --range "$base..$head"
          else
            echo "no usable base commit; scanning full tree"
            bash scripts/check-no-secrets.sh
          fi
