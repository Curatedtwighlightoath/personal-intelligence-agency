# PIA backend stack — Postgres+pgvector + the FastAPI app.
#
# The MCP server (server.py) is NOT defined here. It speaks stdio and is
# launched on demand by VS Code / Claude Desktop on the operator's laptop,
# pointed at this Postgres over Tailscale or an SSH tunnel. See DEPLOY.md.
#
# Required .env keys:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB  -> initialise the db
#   DATABASE_URL                                   -> for the api container;
#       use 'db' as the host (compose network), e.g.
#       postgresql://pia:CHANGEME@db:5432/pia
#   ANTHROPIC_API_KEY, OPENAI_API_KEY              -> per .env.example

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Loopback-only by default. Reach this from the laptop via Tailscale
    # (recommended) or an SSH tunnel — see DEPLOY.md. Don't change to
    # 0.0.0.0 unless you've configured pg_hba.conf and a strong password.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # API is intended for LAN/Tailnet consumption — bind to all interfaces.
    # Put a reverse proxy in front before exposing this beyond your tailnet.
    ports:
      - "8000:8000"

volumes:
  pgdata:
